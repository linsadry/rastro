<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Rastro"/>
  <title>Rastro</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { background:#EDE8E0; min-height:100vh; display:flex; align-items:center; justify-content:center; font-family:"Helvetica Neue",sans-serif; }
    #root { width:100%; max-width:390px; min-height:100vh; background:#F8F4EE; position:relative; overflow:hidden; }
    @media(min-width:768px){
      body { padding:40px 20px; }
      #root { width:390px; min-height:844px; max-height:calc(100vh - 80px); border-radius:44px;
        box-shadow:0 0 0 10px #1C1C1E,0 0 0 12px #3A3A3C,0 40px 100px rgba(0,0,0,0.4); }
      #root::before { content:""; position:absolute; top:0; left:50%; transform:translateX(-50%);
        width:126px; height:37px; background:#1C1C1E; border-radius:0 0 22px 22px; z-index:10000; pointer-events:none; }
    }
    @media(min-width:1100px){
      body { flex-direction:row; gap:80px; padding:40px 80px; }
      .brand { display:flex !important; }
    }
    .brand { display:none; flex-direction:column; gap:16px; min-width:280px; }
    .brand h1 { font-family:"Georgia",serif; font-size:72px; font-weight:600; color:#2F3E34; line-height:1; letter-spacing:-2px; }
    .brand p { font-size:18px; color:#7A6A58; line-height:1.6; font-style:italic; }
    .brand .dot { width:32px; height:2px; background:#C46A3A; border-radius:2px; }
    #msg { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#F8F4EE; z-index:9999; gap:12px; padding:30px; }
    #msg h1 { font-size:28px; color:#2F3E34; font-weight:600; }
    #status { font-size:12px; color:#B0A090; text-align:center; max-width:300px; }
  </style>
</head>
<body>
  <div class="brand">
    <h1>Rastro</h1>
    <p>Suas viagens.<br/>Suas memórias.<br/>Tudo organizado.</p>
    <div class="dot"></div>
  </div>
  <div id="root">
    <div id="msg"><h1>Rastro</h1><p id="status">Carregando…</p></div>
  </div>
  <script src="images.js"></script>
  <script src="app.js"></script>
  <script>
    if(typeof window._mountRastro==='function'){
      window._mountRastro();
    } else {
      var s=document.getElementById('status');
      s.textContent='Erro: app não carregou';
      s.style.color='#C0392B';
    }
  </script>
</body>
</html>
