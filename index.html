<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Rastro"/>
  <meta name="theme-color" content="#F8F4EE"/>
  <title>Rastro</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { height:100%; }
    body { background:#F8F4EE; font-family:"Helvetica Neue",sans-serif; }
    /* Tela cheia no celular; no desktop, coluna central limpa, sem moldura */
    #root {
      width:100%;
      max-width:480px;
      margin:0 auto;
      min-height:100dvh;
      background:#F8F4EE;
      position:relative;
    }
    @media(min-width:520px){
      body { background:#EDE8E0; }
      #root { box-shadow:0 0 40px rgba(0,0,0,0.08); }
    }
    #msg { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#F8F4EE; z-index:9999; gap:12px; padding:30px; }
    #msg h1 { font-size:28px; color:#2F3E34; font-weight:600; }
    #status { font-size:12px; color:#B0A090; text-align:center; max-width:300px; }
  </style>
</head>
<body>
  <div id="root">
    <div id="msg"><h1>Rastro</h1><p id="status">Carregando…</p></div>
  </div>
  <script>
    window.addEventListener('unhandledrejection', function(e){
      var s = document.getElementById('status');
      if (s) { s.textContent = 'Erro: ' + e.reason; s.style.color = '#C0392B'; }
    });
  </script>
  <script src="images.js"></script>
  <script src="app.js"></script>
  <script>
    if (typeof window._mountRastro === 'function') {
      window._mountRastro();
    } else {
      var s = document.getElementById('status');
      s.textContent = 'Erro: app não carregou';
      s.style.color = '#C0392B';
    }
  </script>
</body>
</html>
